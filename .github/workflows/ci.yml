name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: License headers
        run: pnpm run license:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Contracts codegen is up to date
        run: |
          pnpm --filter @document-chat/contracts run generate
          git diff --exit-code -- packages/contracts/src/types.ts

      - name: Test (vitest)
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E (playwright)
        run: pnpm --filter web run test:e2e

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned, not `latest`: `latest` resolves at job runtime against the
          # calendar, so a green commit can silently turn red when upstream
          # ships a release (this is exactly what bit us in June 2026). Renovate
          # opens a PR to bump this (see .github/renovate.json) so toolchain
          # changes are reviewable instead of arriving invisibly.
          # renovate: datasource=github-releases depName=supabase/cli
          version: 2.106.0

      - name: Start Supabase
        run: supabase start

      - name: Export Supabase env
        # `supabase status -o env` emits shell-style KEY="value" with quotes.
        # $GITHUB_ENV takes everything after = verbatim, so the quotes would
        # become part of the value (breaking URL parsing). Strip them — the
        # values (URLs, JWTs, hex keys) contain no embedded quotes.
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed 's/"//g' >> "$GITHUB_ENV"

      - name: Integration tests (vitest)
        run: pnpm --filter web run test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop
