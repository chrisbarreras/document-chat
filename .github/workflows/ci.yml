name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: License headers
        run: pnpm run license:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Contracts codegen is up to date
        run: |
          pnpm --filter @document-chat/contracts run generate
          git diff --exit-code -- packages/contracts/src/types.ts

      - name: Test (vitest)
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E (playwright)
        run: pnpm --filter web run test:e2e
