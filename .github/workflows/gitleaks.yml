name: gitleaks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit in a PR, not just the tip.
          fetch-depth: 0

      # We install the gitleaks binary directly instead of using
      # `gitleaks/gitleaks-action`. The marketplace action requires a
      # GITLEAKS_LICENSE secret for repos under a GitHub Organization; the
      # underlying OSS binary has no such restriction. Pin the version so
      # rule changes are explicit, not silent.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        # `detect` scans staged + committed history. `--redact` keeps any
        # matched secret out of the build log; the action used to do this
        # by default. `--config` honors the same .gitleaks.toml the action
        # consumed. Non-zero exit on findings fails the job.
        run: gitleaks detect --config=.gitleaks.toml --redact --verbose --no-banner
